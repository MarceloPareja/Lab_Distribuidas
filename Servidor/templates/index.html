<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat en Tiempo Real</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

  <div id="login-screen">
    <h1>💬 Chat en Tiempo Real</h1>
    <p>Ingresa tu nombre para unirte al chat</p>
    <div class="input-group">
      <label for="username-input">Tu nombre</label>
      <input id="username-input" type="text" placeholder="Ej: Mateo" maxlength="30" autocomplete="off" />
    </div>
    <button id="join-btn" class="btn-primary">Unirse al chat →</button>
  </div>

  <div id="chat-screen">
    <div class="chat-wrapper">

      <header class="chat-header">
        <span class="title">💬 Chat en Tiempo Real</span>
        <div id="conn-status">
          <div id="conn-dot"></div>
          <span id="conn-label">Desconectado</span>
        </div>
      </header>

      <div id="messages"></div>

      <div class="chat-input-bar">
        <input id="msg-input" type="text" placeholder="Escribe un mensaje..." maxlength="500" autocomplete="off" />
        <button id="send-btn">Enviar</button>
      </div>

      <aside id="user-list-panel">
        <p class="sidebar-title">Conectados</p>
        <div id="user-list"></div>
      </aside>

    </div>
  </div>

  <script src="/static/js/chat.js"></script>
</body>
</html>
